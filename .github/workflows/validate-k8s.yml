name: Validate Kubernetes Manifests

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate YAML manifests
        run: |
          find k8s -name '*.yaml' -not -path '*/dashboards/*' -not -name 'values.yaml' | xargs kubeconform -summary -ignore-missing-schemas

      - name: Validate dashboard ConfigMaps (YAML syntax only)
        run: |
          for f in k8s/monitoring/dashboards/*.yaml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "OK: $f"
          done
