{% extends 'base.html' %}
{% block content %}
<hgroup>
    <h2>Painel de Controle</h2>
</hgroup>

<article>
    <header><strong>Status do PC</strong></header>
    <div id="status-box"
         hx-get="/status-fragment"
         hx-trigger="load, every 15s"
         hx-swap="innerHTML">
        <p aria-busy="true">Verificando...</p>
    </div>
</article>

{% for game_id, g in games.items() %}
<article>
    <header><strong>{{ g.emoji }} {{ g.nome }}</strong></header>
    <div id="game-box-{{ game_id }}"
         hx-get="/game-fragment/{{ game_id }}"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML">
        <p aria-busy="true">Consultando...</p>
    </div>
</article>
{% endfor %}

{% if tunnel_url %}
<article>
    <header><strong>🌐 Painel (acesso externo)</strong></header>
    <p><a href="{{ tunnel_url }}" target="_blank" rel="noopener">{{ tunnel_url }}</a></p>
</article>
{% endif %}

<script>
function copyAddr(game) {
    const txt = document.getElementById('addr-' + game).innerText;
    navigator.clipboard.writeText(txt).then(() => {
        const fb = document.getElementById('copied-' + game);
        fb.style.display = 'inline';
        setTimeout(() => fb.style.display = 'none', 2000);
    });
}
</script>
{% endblock %}
