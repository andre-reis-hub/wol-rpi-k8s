server:
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: local-storage
  ha:
    enabled: false
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "raft" {
        path = "/vault/data"
        node_id = "vault-0"
      }
      service_registration "kubernetes" {}
