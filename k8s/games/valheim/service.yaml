apiVersion: v1
kind: Service
metadata:
  name: valheim-service
  namespace: valheim
spec:
  type: NodePort
  selector:
    app: valheim-server
  ports:
    - name: game
      port: 2456
      targetPort: 2456
      protocol: UDP
      nodePort: 30456
    - name: game2
      port: 2457
      targetPort: 2457
      protocol: UDP
      nodePort: 30457
