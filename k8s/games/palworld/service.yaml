apiVersion: v1
kind: Service
metadata:
  name: palworld-service
  namespace: palworld
spec:
  type: NodePort
  selector:
    app: palworld-server
  ports:
    - name: game
      port: 8211
      targetPort: 8211
      protocol: UDP
      nodePort: 30211
    - name: query
      port: 27015
      targetPort: 27015
      protocol: UDP
      nodePort: 30015
