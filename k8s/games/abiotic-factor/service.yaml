apiVersion: v1
kind: Service
metadata:
  name: abiotic-factor-service
  namespace: abiotic-factor
spec:
  type: NodePort
  selector:
    app: abiotic-factor-server
  ports:
    - name: game
      port: 7777
      targetPort: 7777
      protocol: UDP
      nodePort: 30777
    - name: query
      port: 27015
      targetPort: 27015
      protocol: UDP
      nodePort: 30016
