apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script
  namespace: backup
data:
  backup.sh: |
    #!/bin/bash
    set -euo pipefail
    echo "[backup] Iniciando $(date)"

    # Senha do restic (injetada pelo Vault Agent)
    export RESTIC_PASSWORD="$(cat /vault/secrets/restic-password)"

    # rclone.conf vem em base64 do Vault -> decodifica
    mkdir -p ~/.config/rclone
    base64 -d /vault/secrets/rclone-conf-b64 > ~/.config/rclone/rclone.conf

    REPO="rclone:gdrive:wol-backups"

    # Inicializa o repo restic na primeira vez
    if ! restic -r "$REPO" snapshots >/dev/null 2>&1; then
      echo "[backup] Inicializando repositorio restic..."
      restic -r "$REPO" init
    fi

    # Backup dos saves dos jogos
    echo "[backup] Rodando restic backup..."
    restic -r "$REPO" backup \
      /data/palworld \
      /data/abiotic-factor \
      /data/valheim \
      --tag "auto-$(date +%Y%m%d)" \
      --host wol-rpi-k8s

    # Retencao: manter 7 diarios
    echo "[backup] Aplicando retencao (7 diarios)..."
    restic -r "$REPO" forget --keep-daily 7 --prune

    echo "[backup] Concluido $(date)"
