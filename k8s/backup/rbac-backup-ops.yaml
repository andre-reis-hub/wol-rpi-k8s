# RBAC adicional: painel precisa criar jobs, ler pods E logs no namespace backup
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-ops
  namespace: backup
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: panel-backup-ops
  namespace: backup
subjects:
  - kind: ServiceAccount
    name: panel-controller
    namespace: kube-system
roleRef:
  kind: Role
  name: backup-ops
  apiGroup: rbac.authorization.k8s.io
