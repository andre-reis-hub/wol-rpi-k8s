apiVersion: batch/v1
kind: CronJob
metadata:
  name: wol-backup
  namespace: backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "backup"
            vault.hashicorp.com/agent-inject-secret-restic-password: "wol/data/backup"
            vault.hashicorp.com/agent-inject-template-restic-password: |
              {{- with secret "wol/data/backup" -}}
              {{ index .Data.data "restic-password" }}
              {{- end -}}
            vault.hashicorp.com/agent-inject-secret-rclone-conf-b64: "wol/data/rclone"
            vault.hashicorp.com/agent-inject-template-rclone-conf-b64: |
              {{- with secret "wol/data/rclone" -}}
              {{ index .Data.data "rclone-conf-b64" }}
              {{- end -}}
            vault.hashicorp.com/agent-pre-populate-only: "true"
        spec:
          serviceAccountName: backup-sa
          restartPolicy: Never
          containers:
            - name: backup
              image: restic/restic:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache rclone bash coreutils >/dev/null 2>&1 || true
                  bash /scripts/backup.sh
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: palworld
                  mountPath: /data/palworld
                  readOnly: true
                - name: abiotic
                  mountPath: /data/abiotic-factor
                  readOnly: true
                - name: valheim
                  mountPath: /data/valheim
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: backup-script
                defaultMode: 0755
            - name: palworld
              hostPath:
                path: /var/lib/rancher/palworld
                type: DirectoryOrCreate
            - name: abiotic
              hostPath:
                path: /var/lib/rancher/abiotic-factor
                type: DirectoryOrCreate
            - name: valheim
              hostPath:
                path: /var/lib/rancher/valheim
                type: DirectoryOrCreate
