apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-finops
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  finops.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "title": "💰 Custo 24/7 (R$/mês estimado)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [{ "expr": "(350 * 0.95 / 1000) * 720", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "currencyBRL", "decimals": 2,
            "color": { "mode": "fixed", "fixedColor": "red" } } },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "💚 Custo REAL (R$ últimos 30d)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [{
            "expr": "(sum_over_time(up{job=\"node-exporter\"}[30d]) / 60) * (350 * 0.95 / 1000)",
            "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "currencyBRL", "decimals": 2,
            "color": { "mode": "fixed", "fixedColor": "green" } } },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "🎉 Economia com WoL (R$/30d)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [{
            "expr": "((350 * 0.95 / 1000) * 720) - ((sum_over_time(up{job=\"node-exporter\"}[30d]) / 60) * (350 * 0.95 / 1000))",
            "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "currencyBRL", "decimals": 2,
            "color": { "mode": "fixed", "fixedColor": "blue" } } },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "⏱️ Horas ligado (30d)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [{ "expr": "sum_over_time(up{job=\"node-exporter\"}[30d]) / 60", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "h", "decimals": 0 } },
          "options": { "colorMode": "value", "graphMode": "area" }
        },
        {
          "title": "📊 Comparativo de custo (24/7 vs Real)",
          "type": "bargauge",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [
            { "expr": "(350 * 0.95 / 1000) * 720", "legendFormat": "Se 24/7", "refId": "A" },
            { "expr": "(sum_over_time(up{job=\"node-exporter\"}[30d]) / 60) * (350 * 0.95 / 1000)", "legendFormat": "Real (30d)", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "currencyBRL", "decimals": 2 } },
          "options": { "orientation": "horizontal", "displayMode": "gradient" }
        },
        {
          "title": "🧠 RAM por jogo (GB)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [{
            "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"palworld|abiotic-factor|valheim\", container!=\"\"}) / 1024/1024/1024",
            "legendFormat": "{{namespace}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "decgbytes" } }
        },
        {
          "title": "⚙️ CPU por jogo (cores)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 11 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [{
            "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"palworld|abiotic-factor|valheim\", container!=\"\"}[5m]))",
            "legendFormat": "{{namespace}}", "refId": "A" }]
        },
        {
          "title": "💾 Disco por jogo (GB)",
          "type": "bargauge",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 11 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "targets": [{
            "expr": "sum by (persistentvolumeclaim) (kubelet_volume_stats_used_bytes{namespace=~\"palworld|abiotic-factor|valheim\"}) / 1024/1024/1024",
            "legendFormat": "{{persistentvolumeclaim}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "decgbytes" } },
          "options": { "orientation": "horizontal", "displayMode": "gradient" }
        }
      ],
      "schemaVersion": 39,
      "tags": ["wol-rpi-k8s", "finops"],
      "templating": { "list": [
        { "name": "DS_PROM", "type": "datasource", "query": "prometheus", "current": {} }
      ]},
      "time": { "from": "now-7d", "to": "now" },
      "title": "FinOps — Custos e Recursos do Homelab",
      "uid": "finops-homelab",
      "version": 2
    }
