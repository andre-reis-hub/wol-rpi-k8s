apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-game-players
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  game-players.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "title": "Palworld — Entradas e Saídas de Jogadores",
          "type": "logs",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending", "enableLogDetails": true },
          "targets": [
            {
              "expr": "{namespace=\"palworld\"} |~ \"joined the server|left the server\"",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Abiotic Factor — Entradas e Saídas de Jogadores",
          "type": "logs",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 9 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending", "enableLogDetails": true },
          "targets": [
            {
              "expr": "{namespace=\"abiotic-factor\"} |~ \"entered the facility|left the facility\"",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Palworld — Jogadores conectando (taxa por 10m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 18 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"palworld\"} |= \"joined the server\" [10m]))",
              "legendFormat": "entradas",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Abiotic Factor — Jogadores conectando (taxa por 10m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 18 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"abiotic-factor\"} |= \"entered the facility\" [10m]))",
              "legendFormat": "entradas",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["wol-rpi-k8s", "game-servers", "loki", "players"],
      "templating": {
        "list": [
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "query": "loki",
            "current": {}
          }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Game Servers — Jogadores e Conexões (Loki)",
      "uid": "game-players-loki",
      "version": 2
    }
